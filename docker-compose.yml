services:
  # ============================
  # Backend: FastAPI + PostgreSQL
  # ============================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vnu_research_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://postgres:1203@postgres:5432/vnu_research_db"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:15-alpine
    container_name: vnu_research_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1203
      POSTGRES_DB: vnu_research_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # ============================
  # Frontend: React + Vite
  # ============================
  frontend:
    build:
      context: ./frontend/vnu-frontend
      dockerfile: Dockerfile
    container_name: vnu_research_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/vnu-frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: "http://localhost:8000/api/v1"
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend

volumes:
  postgres_data:
